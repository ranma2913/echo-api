name: release

on: # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
  push:
    branches:
      - 'master'
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE: ranma2913/echo-api

permissions:
  contents: read   # Needed for actions/checkout
  packages: write  # Needed to push images to ghcr.io

# Cancel currently running workflow if we get a new commit
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full git history is needed for Sonar blame

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: git-describe
        run: echo "DOCKER_TAG=$(git describe --tags --always --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || echo 'v0.0.0')" >> "$GITHUB_ENV"

      - name: maven-package-native-image
        run: |
          ./mvnw -B package -Pnative \
          -Dspring-boot.build-image.imageName=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          -Dspring-boot.build-image.tags=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest

      - name: docker-image-inspect
        run: |
          docker image inspect ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: docker-push
        run: |
          docker image push --all-tags ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}
