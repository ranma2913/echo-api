name: release

on: # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
  push:
    branches:
      - 'master'
  workflow_dispatch:

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE: ranma2913/echo-api

permissions:
  contents: read   # Needed for actions/checkout
  packages: write  # Needed to push images to ghcr.io

# Cancel currently running workflow if we get a new commit
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full git history is needed for Sonar blame

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: actions/cache@v4
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: maven-cache-summary
        run: |
          if [ "${{ steps.maven-cache.outputs.cache-hit }}" = "true" ]; then
            echo "SUMMARY_CACHE=✅ Maven cache **hit** \`${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}\`" >> "$GITHUB_ENV"
          else
            echo "SUMMARY_CACHE=⚠️ Maven cache **miss** — dependencies downloaded fresh" >> "$GITHUB_ENV"
          fi

      - name: git-describe
        run: |
          TAG=$(git describe --tags --always --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || echo 'v0.0.0')
          echo "DOCKER_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "SUMMARY_GIT=🏷️ Tag resolved to \`${TAG}\` from commit \`$(git rev-parse --short HEAD)\` on \`${GITHUB_REF_NAME}\`" >> "$GITHUB_ENV"

      - name: maven-package-native-image
        run: |
          ./mvnw -B verify \
          -Dspring-boot.build-image.imageName=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
          -Dspring-boot.build-image.tags=${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
          echo "SUMMARY_BUILD=✅ Maven build & native image **succeeded**" >> "$GITHUB_ENV"

      - name: docker-image-inspect
        run: |
          FORMAT='{{.Id}} | Size: {{.Size}} bytes | Created: {{.Created}}'
          IMAGE_INFO=$(docker image inspect ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
            --format "${FORMAT}")
          echo "SUMMARY_INSPECT=🐳 \`${IMAGE_INFO}\`" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: docker-push
        run: |
          docker image push --all-tags ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}
          echo "SUMMARY_PUSH=🚀 Pushed \`${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}\` and \`:latest\`" >> "$GITHUB_ENV"

      - name: build-summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # 📦 Release Build Summary

          | Field | Value |
          |-------|-------|
          | **Workflow** | \`${{ github.workflow }}\` |
          | **Triggered by** | \`${{ github.event_name }}\` |
          | **Actor** | \`${{ github.actor }}\` |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Run** | [\`#${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ## 🔍 Step Details

          | Step | Result |
          |------|--------|
          | Maven cache | ${SUMMARY_CACHE:-⚪ not reported} |
          | Git describe | ${SUMMARY_GIT:-⚪ not reported} |
          | Maven build | ${SUMMARY_BUILD:-❌ did not complete} |
          | Image inspect | ${SUMMARY_INSPECT:-⚪ not reported} |
          | Docker push | ${SUMMARY_PUSH:-❌ did not complete} |

          ## 🐳 Docker Images Published

          | Tag | Image |
          |-----|-------|
          | versioned | \`${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${DOCKER_TAG}\` |
          | latest | \`${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest\` |
          EOF
