name: ci

on: # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
  push:
    branches-ignore: [ master ]
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ranma2913/echo-api

# Cancel currently running workflow if we get a new commit
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full git history is needed for Sonar blame

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: actions/cache@v5
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: maven-cache-summary
        run: |
          if [ "${{ steps.maven-cache.outputs.cache-hit }}" = "true" ]; then
            echo "SUMMARY_CACHE=✅ Maven cache **hit** \`${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}\`" >> "$GITHUB_ENV"
          else
            echo "SUMMARY_CACHE=⚠️ Maven cache **miss** — dependencies downloaded fresh" >> "$GITHUB_ENV"
          fi

      - name: maven-verify
        run: |
          ./mvnw -B -ntp verify -Djacoco.haltOnFailure=false
          echo "SUMMARY_BUILD=✅ Maven verify **succeeded**" >> "$GITHUB_ENV"

      - name: jacoco-report
        id: jacoco-report
        # Only runs on pull_request events — push events have no PR to comment on
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: |
            ${{ github.workspace }}/target/site/jacoco/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '# :lobster: Coverage Report'
          update-comment: true
          min-coverage-overall: 75
          min-coverage-changed-files: 90

      - name: jacoco-summary
        if: github.event_name == 'pull_request'
        run: |
          OVERALL="${{ steps.jacoco-report.outputs.coverage-overall }}"
          CHANGED="${{ steps.jacoco-report.outputs.coverage-changed-files }}"
          echo "SUMMARY_JACOCO=🦞 Coverage — overall: \`${OVERALL}%\` | changed files: \`${CHANGED}%\` (thresholds: overall ≥75%, changed ≥90%)" >> "$GITHUB_ENV"

      - name: build-summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # 🔬 CI Build Summary

          | Field | Value |
          |-------|-------|
          | **Workflow** | \`${{ github.workflow }}\` |
          | **Triggered by** | \`${{ github.event_name }}\` |
          | **Actor** | \`${{ github.actor }}\` |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Commit** | \`${{ github.sha }}\` |
          | **Run** | [\`#${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ## 🔍 Step Details

          | Step | Result |
          |------|--------|
          | Maven cache | ${SUMMARY_CACHE:-⚪ not reported} |
          | Maven verify | ${SUMMARY_BUILD:-❌ did not complete} |
          | JaCoCo coverage | ${SUMMARY_JACOCO:-⚪ not a pull request} |
          EOF

