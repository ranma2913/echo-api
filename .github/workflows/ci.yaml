name: ci

on: # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
  push:
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ranma2913/echo-api

# Cancel currently running workflow if we get a new commit
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full git history is needed for Sonar blame

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: maven-test-native
        run: |
          ./mvnw -B test -Pnative -Djacoco.haltOnFailure=false

      - name: jacoco-report
        id: jacoco-report
        # Only runs on pull_request events — push events have no PR to comment on
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: |
            ${{ github.workspace }}/target/site/jacoco/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '# :lobster: Coverage Report'
          update-comment: true
          min-coverage-overall: 75
          min-coverage-changed-files: 90
