name: semver-bump

on: # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
  pull_request:
    branches-ignore:
      - 'master'
  workflow_dispatch:
    inputs:
      bump-level:
        description: "Semver Level to Bump:"
        required: true
        type: choice
        options: [ patch,minor,major ]

# Cancel currently running workflow if we get a new commit
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semver-bump:
    if: github.ref != 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full git history is needed for Sonar blame
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: semver-lookup
        id: semver-lookup
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || echo 'v0.0.0')
          echo "LAST_TAG=${LAST_TAG}"
          echo "LAST_TAG=${LAST_TAG}" >> "$GITHUB_ENV"
          echo "LAST_VERSION=${LAST_TAG#v}"
          echo "LAST_VERSION=${LAST_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "SUMMARY_LOOKUP=đź”Ť Last tag found: \`${LAST_TAG}\` â†’ version \`${LAST_TAG#v}\`" >> "$GITHUB_ENV"

      - id: semver-bump
        uses: olegsu/semver-action@v1
        with:
          version: ${{ steps.semver-lookup.outputs.LAST_VERSION }}
          bump: ${{ inputs.bump-level }}

      - name: semver-bump-summary
        run: |
          echo "SUMMARY_BUMP=â¬†ď¸Ź Bumped \`${{ inputs.bump-level }}\` level: \`${LAST_TAG}\` â†’ \`v${{ steps.semver-bump.outputs.version }}\`" >> "$GITHUB_ENV"

      - name: maven-versions-set
        id: maven-versions-set
        run: |
          NEW_VERSION=${{ steps.semver-bump.outputs.version }}
          echo "NEW_VERSION=$NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          NEW_TAG=v$NEW_VERSION
          echo "NEW_TAG=$NEW_TAG"
          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_ENV"
          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_OUTPUT"
          ./mvnw versions:set -DnewVersion=$NEW_VERSION && ./mvnw versions:commit
          echo "SUMMARY_MAVEN=âś… Maven \`pom.xml\` version set to \`${NEW_VERSION}\`" >> "$GITHUB_ENV"

      - name: git-commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin
          git checkout $GITHUB_HEAD_REF
          git commit -a -m ":arrow_up: Bump Semver = ${NEW_VERSION}" || true
          git push
          echo "SUMMARY_COMMIT=đź“ť Committed version bump to \`${GITHUB_HEAD_REF}\`" >> "$GITHUB_ENV"

      - name: git-tag
        run: |
          git tag -a -m ":arrow_up: Bump Semver = ${NEW_VERSION}" v${NEW_VERSION} HEAD || true
          git push --tags
          echo "SUMMARY_TAG=đźŹ·ď¸Ź Tagged \`v${NEW_VERSION}\` and pushed to origin" >> "$GITHUB_ENV"

      - name: build-summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # đź”– Semver Bump Summary

          | Field | Value |
          |-------|-------|
          | **Workflow** | \`${{ github.workflow }}\` |
          | **Triggered by** | \`${{ github.event_name }}\` |
          | **Actor** | \`${{ github.actor }}\` |
          | **Branch** | \`${{ github.ref_name }}\` |
          | **Bump level** | \`${{ inputs.bump-level }}\` |
          | **Run** | [\`#${{ github.run_number }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ## đź”Ť Step Details

          | Step | Result |
          |------|--------|
          | Semver lookup | ${SUMMARY_LOOKUP:-âťŚ did not complete} |
          | Semver bump | ${SUMMARY_BUMP:-âťŚ did not complete} |
          | Maven versions:set | ${SUMMARY_MAVEN:-âťŚ did not complete} |
          | Git commit | ${SUMMARY_COMMIT:-âťŚ did not complete} |
          | Git tag | ${SUMMARY_TAG:-âťŚ did not complete} |

          ## đźŹ·ď¸Ź Version

          | | Tag |
          |---|-----|
          | **Before** | \`${LAST_TAG:-unknown}\` |
          | **After** | \`v${NEW_VERSION:-unknown}\` |
          EOF

